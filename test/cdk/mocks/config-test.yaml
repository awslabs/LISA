env: dev

dev:
  appName: lisa
  profile:
  deploymentName: test-lisa
  accountNumber: '012345678901'
  region: us-iso-east-1
  pypiConfig:
    indexUrl: localhost:8080
    trustedHost: localhost
  deploymentStage: dev
  removalPolicy: destroy
  runCdkNag: false
  webAppAssetsPath: './test/cdk/mocks/ui/'
  s3BucketModels: hf-models-gaiic
  mountS3DebUrl: https://s3.amazonaws.com/mountpoint-s3-release/latest/x86_64/mount-s3.deb
  accountNumbersEcr:
    - '012345678901'
  deployRag: true
  deployUI: true
  deployDocs: true
  deployMcp: true
  deployMcpWorkbench: true
  useCustomBranding: false
  customDisplayName: LISA
  authConfig:
    authority: test
    clientId: test
  maxAzs: 3
  logLevel: DEBUG
  restApiConfig:
    sslCertIamArn: arn:aws:iam::012345678901:server-certificate/lisa-self-signed-dev
  ragRepositories: []
  ragFileProcessingConfig:
    chunkSize: 512
    chunkOverlap: 51
  ecsModels:
    - modelName: mistralai/Mistral-7B-Instruct-v0.3
      inferenceContainer: tgi
      baseImage: ghcr.io/huggingface/text-generation-inference:latest
    - modelName: intfloat/e5-large-v2
      inferenceContainer: tei
      baseImage: ghcr.io/huggingface/text-embeddings-inference:latest
    - modelName: openai/gpt-oss-20b
      inferenceContainer: vllm
      baseImage: openai/vllm:latest
  litellmConfig:
    db_key: sk-012345 #pragma: allowlist secret
  iamRdsAuth: true
