default_language_version:
  node: system
  python: python3.13
repos:
- repo: local
  hooks:
    - id: verify-config
      name: Verify config file
      description: Verify config file to check if certain parameters are empty
      entry: node scripts/verify-config.mjs
      verbose: true
      language: system
      files: config-base.yaml

- repo: https://github.com/PyCQA/bandit
  rev: '1.9.4'
  hooks:
    - id: bandit
      args: [--recursive, -c=pyproject.toml]
      additional_dependencies: ['bandit[toml]', 'pbr', 'PyYAML']
      exclude: ^test/cdk/stacks/__baselines__/

- repo: https://github.com/Yelp/detect-secrets
  rev: v1.5.0
  hooks:
    - id: detect-secrets
      exclude: (?x)^(
        .*.ipynb|config.yaml|.*.md|.*test.*.py|test/cdk/stacks/__baselines__/.*\.json
        )$

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
    - id: check-added-large-files
      args: ['--maxkb=500']
    - id: check-ast
    - id: check-json
      exclude: ^test/cdk/stacks/__baselines__/
    - id: check-toml
    - id: check-yaml
    - id: check-case-conflict
    - id: check-executables-have-shebangs
    - id: check-shebang-scripts-are-executable
    - id: check-symlinks
    - id: debug-statements
    - id: mixed-line-ending
      args: ['--fix=lf']
      exclude: ^test/cdk/stacks/__baselines__/
    - id: fix-byte-order-marker
      exclude: ^test/cdk/stacks/__baselines__/
    - id: check-merge-conflict
    - id: detect-private-key
    - id: end-of-file-fixer
      exclude: ^test/cdk/stacks/__baselines__/
    - id: trailing-whitespace
      exclude: ^test/cdk/stacks/__baselines__/
    - id: name-tests-test
      args: ['--pytest-test-first']
      files: ^test/.*\.py$
      exclude: (^test/cdk/|^test/integration/|__init__\.py$|README|conftest\.py$|integration_definitions\.py$|integration_test_utils\.py$|config_loader\.py$|list-integ-models\.py$|integration-setup-test\.py$)
    - id: no-commit-to-branch
      args: ['--branch', 'main', '--branch', 'mainline']

- repo: https://github.com/pre-commit/pygrep-hooks
  rev: v1.10.0
  hooks:
    - id: python-check-mock-methods
    - id: python-no-eval
    - id: python-no-log-warn
    - id: python-use-type-annotations

# NOTE: shellcheck-py fails to install in environments with custom CA certs
# (SSL: CERTIFICATE_VERIFY_FAILED). Install shellcheck locally and uncomment,
# or use `apt install shellcheck` / `brew install shellcheck` first.
# - repo: https://github.com/shellcheck-py/shellcheck-py
#   rev: v0.11.0.1
#   hooks:
#     - id: shellcheck
#       args: ['--severity=warning']

- repo: https://github.com/pycqa/isort
  rev: 8.0.1
  hooks:
    - id: isort
      name: isort (python)
      exclude: ^test/cdk/stacks/__baselines__/

- repo: https://github.com/psf/black
  rev: '26.3.1'
  hooks:
    - id: black
      exclude: ^test/cdk/stacks/__baselines__/

# NOTE: docformatter is incompatible with black — it removes the blank line
# before module docstrings, which violates PEP 8 E302 and black's formatting.
# Uncomment if the upstream issue is resolved:
# https://github.com/PyCQA/docformatter/issues
# - repo: https://github.com/PyCQA/docformatter
#   rev: v1.7.8
#   hooks:
#     - id: docformatter
#       args:
#         - --in-place
#         - --black
#         - --wrap-summaries=120
#         - --wrap-descriptions=120
#         - --style=google
#       exclude: ^test/cdk/stacks/__baselines__/

- repo: https://github.com/codespell-project/codespell
  rev: v2.4.2
  hooks:
    - id: codespell
      entry: codespell
      args: ['--skip=*.git*,*cdk.out*,*venv*,*mypy_cache*,*package-lock*,*node_modules*,*dist/*,*/public/*,*poetry.lock*,*coverage*,*models/*,*htmlcov*,*TIKTOKEN_CACHE/*,*test/cdk/stacks/__baselines__/*,*.jsonl', "-L=xdescribe,assertIn,afterAll"]
      pass_filenames: false

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 'v0.15.11'
  hooks:
    - id: ruff-check
      args:
        - --exit-non-zero-on-fix
        - --per-file-ignores=test/**/*.py:E402,test/**/*.py:PLC0415,test/**/*.py:D
        - --fix
      exclude: (\.ipynb$|^test/cdk/stacks/__baselines__/)

- repo: https://github.com/pycqa/flake8
  rev: '7.3.0'
  hooks:
    - id: flake8
      additional_dependencies:
        - flake8-broken-line
        - flake8-bugbear
        - flake8-comprehensions
        - flake8-debugger
      args:
        - --max-line-length=120
        - --extend-immutable-calls=Query,fastapi.Depends,fastapi.params.Depends
        - --ignore=B008,B042,E203,E704,W503 # Ignore error for function calls in argument defaults and exception __init__ args
      exclude: ^(__init__.py$|.*\/__init__.py$|test/cdk/stacks/__baselines__/)


- repo: https://github.com/pre-commit/mirrors-mypy
  rev: 'v1.20.1'
  hooks:
    - id: mypy
      verbose: true
      # mypy currently fails on the gitlab runner and also fails locally due to the mono
      # repo nature of LISA and two "api" modules. This command will make it so mypy
      # issues are reported but non-blocking
      entry: bash -c 'mypy "$@" || true' --
      args:
        - --config-file=pyproject.toml
        - --install-types
        - --non-interactive
      exclude: ^test/

- repo: https://github.com/pre-commit/mirrors-eslint
  rev: 'v10.2.1'
  hooks:
    - id: eslint
      files: \.[jt]sx?$
      types: [file]
      args:
        - --max-warnings=40
        - --no-warn-ignored
        - --fix

- repo: https://github.com/DavidAnson/markdownlint-cli2
  rev: v0.17.2
  hooks:
    - id: markdownlint-cli2
      args: ['--fix']
      exclude: (^node_modules/|^test/cdk/stacks/__baselines__/|CHANGELOG\.md$)

- repo: https://github.com/oxipng/oxipng
  rev: v10.1.0
  hooks:
    - id: oxipng
      args: ['-o', '4', '--strip', 'safe']
      exclude: ^(node_modules/|lib/core/layers/)

# - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
#   rev: v1.3.2
#   hooks:
#     - id: python-safety-dependencies-check

- repo: https://github.com/asottile/pyupgrade
  rev: v3.21.2
  hooks:
    - id: pyupgrade
      args: [--py313-plus]

# - repo: https://github.com/bridgecrewio/checkov
#   rev: '3.2.327'
#   hooks:
#     - id: checkov
#       args: [--framework, cloudformation, --framework, arm, --quiet, --compact]
#       files: \.(json|yaml|yml|template)$

- repo: https://github.com/Lucas-C/pre-commit-hooks
  rev: v1.5.6
  hooks:
    - id: insert-license
      files: \.[jt]sx?$  # *.js, *.jsx, *.ts and *.tsx
      args:
        - --license-filepath
        - .precommit-license-header.txt        # defaults to: LICENSE.txt
        - --comment-style
        - /**| |*/        # defaults to:  #

- repo: https://github.com/Lucas-C/pre-commit-hooks
  rev: v1.5.6
  hooks:
    - id: insert-license
      files: \.py$
      args:
        - --license-filepath
        - .precommit-license-header.txt        # defaults to: LICENSE.txt
        - --comment-style
        - "#  "        # defaults to:  #
